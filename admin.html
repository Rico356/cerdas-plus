<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CerdasPlus — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div id="adminApp">
    <div class="global-loader" id="globalLoader">
      <div class="loader-ring"></div>
      <span>Admin Panel</span>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="confirmModal" style="display:none">
    <div class="modal-box">
      <div class="modal-icon" id="modalIcon">⚠️</div>
      <div class="modal-title" id="modalTitle">Konfirmasi</div>
      <div class="modal-body"  id="modalBody">Apakah kamu yakin?</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
        <button class="btn" id="modalConfirmBtn" onclick="runModalAction()">Ya, Lanjutkan</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
